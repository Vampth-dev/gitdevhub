<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Será que você me conhece?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a0f26;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: #2e1d47;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .photos-container {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
        }

        .photo-card {
            flex: 1;
            background-color: #3d295c;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .correct {
            background-color: #2ec4b6 !important;
        }

        .wrong {
            background-color: #e71d36 !important;
        }

        .love-container {
            position: relative;
            height: 150px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #btn-nao {
            position: absolute;
            transition: all 0.15s ease;
            z-index: 10;
        }

        #btn-sim {
            background-color: #2ec4b6;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="game-container">
        <h2 id="question-text">Se você conhece seu namorado, qual ele escolheria?</h2>
        
        <div class="photos-container" id="photos-area">
            <div class="photo-card">
                <img id="img-opt1" src="foto1a.webp" alt="Opção 1">
                <span>Opção 1</span>
            </div>
            <div class="photo-card">
                <img id="img-opt2" src="foto1b.webp" alt="Opção 2">
                <span>Opção 2</span>
            </div>
        </div>

        <div class="btn-container" id="quiz-buttons">
            <button class="btn" id="btn-opt1" onclick="checkAnswer(1)">Opção 1</button>
            <button class="btn" id="btn-opt2" onclick="checkAnswer(2)">Opção 2</button>
        </div>

        <div id="final-screen" class="hidden">
            <h2>Você me ama ainda?</h2>
            <div class="love-container" id="love-area">
                <button class="btn" id="btn-sim" onclick="congratulations()">SIM!</button>
                <button class="btn" id="btn-nao" onmouseover="fleeButton()" onclick="fleeButton()">NÃO</button>
            </div>
        </div>
    </div>

    <script>
        const rounds = [
            { img1: "foto1a.webp", img2: "foto1b.webp", correct: 1 },
            { img1: "foto2a.webp", img2: "foto2b.webp", correct: 2 },
            { img1: "foto3a.webp", img2: "foto3b.webp", correct: 1 },
            { img1: "foto4a.webp", img2: "foto4b.webp", correct: 2 },
            { img1: "foto5a.webp", img2: "foto5b.webp", correct: 1 },
            { img1: "foto6a.webp", img2: "foto6b.webp", correct: 2 }
        ];

        let currentRound = 0;
        let canClick = true;
        let fleeCount = 0;

        function loadRound() {
            if (currentRound < rounds.length) {
                document.getElementById("img-opt1").src = rounds[currentRound].img1;
                document.getElementById("img-opt2").src = rounds[currentRound].img2;
                document.getElementById("btn-opt1").className = "btn";
                document.getElementById("btn-opt2").className = "btn";
                canClick = true;
            } else {
                showLoveScreen();
            }
        }

        function checkAnswer(chosenOption) {
            if (!canClick) return;
            canClick = false;

            const correctOption = rounds[currentRound].correct;
            const btn1 = document.getElementById("btn-opt1");
            const btn2 = document.getElementById("btn-opt2");

            if (correctOption === 1) {
                btn1.classList.add("correct");
                btn2.classList.add("wrong");
            } else {
                btn1.classList.add("wrong");
                btn2.classList.add("correct");
            }

            setTimeout(() => {
                currentRound++;
                loadRound();
            }, 1200);
        }

        function showLoveScreen() {
            document.getElementById("photos-area").classList.add("hidden");
            document.getElementById("quiz-buttons").classList.add("hidden");
            document.getElementById("question-text").classList.add("hidden");
            document.getElementById("final-screen").classList.remove("hidden");
            
            const btnNao = document.getElementById("btn-nao");
            btnNao.style.position = "absolute";
            btnNao.style.left = "60%";
        }

        function fleeButton() {
            const btnNao = document.getElementById("btn-nao");
            const loveArea = document.getElementById("love-area");
            
            if (fleeCount < 6) {
                const maxX = loveArea.clientWidth - btnNao.clientWidth;
                const maxY = loveArea.clientHeight - btnNao.clientHeight;
                
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;
                
                btnNao.style.left = `${newX}px`;
                btnNao.style.top = `${newY}px`;
                fleeCount++;
            } else {
                btnNao.style.display = "none";
                document.getElementById("btn-sim").style.transform = "scale(1.5)";
            }
        }

        function congratulations() {
            document.getElementById("final-screen").innerHTML = "<h2>Sabia! Eu também te amo muito! ❤️</h2>";
        }

        window.onload = loadRound;
    </script>
</body>
</html>
